# ============================================================
# Telegraf SNMP config — Router monitoring lab
# ============================================================

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ============================================================
# Output: InfluxDB 1.8
# ============================================================

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "snmp"

# ============================================================
# Input: SNMPv3 — Linux router
# ============================================================

[[inputs.snmp]]
  agents = ["udp://router:161"]

  version = 3
  sec_name = "snmpadmin"
  auth_protocol = "SHA"
  auth_password = "authpass123"
  sec_level = "authPriv"
  priv_protocol = "AES"
  priv_password = "privpass123"

  name = "snmp_router"
  agent_host_tag = "source"

  # ----------------------------------------------------------
  # Basic system information
  # ----------------------------------------------------------

  [[inputs.snmp.field]]
    name = "sysUpTime"
    oid = "DISMAN-EVENT-MIB::sysUpTimeInstance"

  [[inputs.snmp.field]]
    name = "sysName"
    oid = "SNMPv2-MIB::sysName.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "sysDescr"
    oid = "SNMPv2-MIB::sysDescr.0"
    is_tag = true

  # ----------------------------------------------------------
  # Interfaces table
  # ----------------------------------------------------------

  [[inputs.snmp.table]]
    name = "interfaces"
    oid = "IF-MIB::ifTable"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "ifIndex"
      oid = "IF-MIB::ifIndex"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "IF-MIB::ifDescr"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = "IF-MIB::ifAdminStatus"

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "IF-MIB::ifOperStatus"

    [[inputs.snmp.table.field]]
      name = "ifMtu"
      oid = "IF-MIB::ifMtu"

    [[inputs.snmp.table.field]]
      name = "ifSpeed"
      oid = "IF-MIB::ifSpeed"

    [[inputs.snmp.table.field]]
      name = "ifInOctets"
      oid = "IF-MIB::ifInOctets"

    [[inputs.snmp.table.field]]
      name = "ifOutOctets"
      oid = "IF-MIB::ifOutOctets"

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "IF-MIB::ifHCInOctets"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "IF-MIB::ifHCOutOctets"

    [[inputs.snmp.table.field]]
      name = "ifPhysAddress"
      oid = "IF-MIB::ifPhysAddress"
      is_tag = true
      conversion = "displayhint"

  # ----------------------------------------------------------
  # IP forwarding status
  # ----------------------------------------------------------

  [[inputs.snmp.field]]
    name = "ipForwarding"
    oid = "IP-MIB::ipForwarding.0"

  # ----------------------------------------------------------
  # Extended commands from NET-SNMP-EXTEND-MIB
  # ----------------------------------------------------------

  [[inputs.snmp.field]]
    name = "defaultRoute"
    oid = "NET-SNMP-EXTEND-MIB::nsExtendOutput1Line.\"defaultRoute\""
    is_tag = true

  [[inputs.snmp.field]]
    name = "ipForwardingStatusText"
    oid = "NET-SNMP-EXTEND-MIB::nsExtendOutput1Line.\"ipForwardingStatus\""
    is_tag = true

# ============================================================
# Input: SNMPv2c — CLASSROOM-MIB (snmpsim)
# ============================================================

[[inputs.snmp]]
  agents = ["udp://snmpsim:161"]

  version = 2
  community = "classroom-manual"

  name = "classroom"
  agent_host_tag = "source"

  # ----------------------------------------------------------
  # Room Table  (1.3.6.1.3.2026.1)
  # ----------------------------------------------------------

  [[inputs.snmp.table]]
    name = "classroom_rooms"
    oid = "1.3.6.1.3.2026.1"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "campus"
      oid = "1.3.6.1.3.2026.1.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "building"
      oid = "1.3.6.1.3.2026.1.1.3"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "capacity"
      oid = "1.3.6.1.3.2026.1.1.4"

    [[inputs.snmp.table.field]]
      name = "adminStatus"
      oid = "1.3.6.1.3.2026.1.1.5"

    [[inputs.snmp.table.field]]
      name = "operStatus"
      oid = "1.3.6.1.3.2026.1.1.6"

  # ----------------------------------------------------------
  # Student Table  (1.3.6.1.3.2026.2)
  # ----------------------------------------------------------

  [[inputs.snmp.table]]
    name = "classroom_students"
    oid = "1.3.6.1.3.2026.2"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "studentName"
      oid = "1.3.6.1.3.2026.2.1.2"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "course"
      oid = "1.3.6.1.3.2026.2.1.3"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "courseYear"
      oid = "1.3.6.1.3.2026.2.1.4"

  # ----------------------------------------------------------
  # Class Table  (1.3.6.1.3.2026.3)
  # ----------------------------------------------------------

  [[inputs.snmp.table]]
    name = "classroom_classes"
    oid = "1.3.6.1.3.2026.3"
    index_as_tag = true

    [[inputs.snmp.table.field]]
      name = "className"
      oid = "1.3.6.1.3.2026.3.1.4"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "position"
      oid = "1.3.6.1.3.2026.3.1.5"
